<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso — Sistema Operacional-Financiero</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="{{ url_for('login') }}">
      <h1>Sistema Operacional-Financiero</h1>
      <p class="sub">Reconstrucción histórica por eventos</p>
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <input type="hidden" name="next" value="{{ next or '' }}">
      <div class="field">
        <label for="usuario">Usuario</label>
        <input id="usuario" name="usuario" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Ingresar</button>
      <p class="muted-note">
        Demo: <b>admin/admin123</b> · <b>gerente/ger123</b> · <b>digitador/dig123</b><br>
        Cambia estas contraseñas en producción.
      </p>
    </form>
  </div>
</body>
</html>
